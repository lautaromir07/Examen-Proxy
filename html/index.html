<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monster Energy - Balanceo Lautaro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Refresca tu código con Monster</h1>
        
        <div class="product">
            <img src="monster.png" alt="Lata de Monster Energy" class="monster-can">
        </div>

        <div class="multimedia">
            <h3>Disfruta la energía en acción</h3>
            <video width="320" height="240" controls loop muted autoplay>
                <source src="video_monster.mp4" type="video/mp4">
                Tu navegador no soporta el elemento de video.
            </video>
        </div>

        <div class="info-box">
            <h2>Prueba de Balanceo de Carga</h2>
            <p><strong>Servidor Backend Actual:</strong> <span class="highlight"><!--# echo var="hostname" --></span></p>
            <p class="instructions">Pulsa <strong>F5</strong> o refresca la página. El nombre del servidor (ID del contenedor) cambiará entre los diferentes nodos backend.</p>
        </div>
    </div>
</body>
</html>
