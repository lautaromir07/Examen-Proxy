version: '3.8'

services:
  proxy:
    image: nginx:alpine
    container_name: proxy_lautaro
    ports:
      - "80:80"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - frontend
      - backend
    depends_on:
      - web1
      - web2

  web1:
    image: nginx:alpine
    container_name: web1_lautaro
    volumes:
      - ./html:/usr/share/nginx/html:ro
      - ./web/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - backend

  web2:
    image: nginx:alpine
    container_name: web2_lautaro
    volumes:
      - ./html:/usr/share/nginx/html:ro
      - ./web/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - backend

networks:
  frontend:
    driver: bridge
  backend:
    internal: true
